<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awaiting Transmission - Aerospace Club</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #05070a; color: #fff;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Vùng không gian chứa sao */
        #space-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle infinite linear;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; box-shadow: 0 0 8px #fff; transform: scale(1.2); }
        }

        /* Nội dung trung tâm */
        .content-box { position: relative; z-index: 10; text-align: center; }
        
        /* Chữ International Women's Day */
        .main-title {
            font-size: 4vw; color: #ffb6c1; text-transform: uppercase;
            letter-spacing: 8px; margin: 0;
            text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
            animation: breathe 3s infinite alternate;
            font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: bold;
        }
        @keyframes breathe {
            from { transform: scale(0.98); text-shadow: 0 0 15px #ff69b4; }
            to { transform: scale(1.02); text-shadow: 0 0 25px #ffb6c1, 0 0 40px #ff69b4; }
        }

        /* Hiệu ứng Radar vòng chờ */
        .radar-loader {
            width: 80px; height: 80px; margin: 40px auto 20px;
            border-radius: 50%; position: relative;
            border: 2px solid rgba(102, 252, 241, 0.2);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.1);
        }
        .radar-loader::before {
            content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 100%;
            border-radius: 100% 0 0 100% / 50% 0 0 50%;
            background: linear-gradient(rgba(102, 252, 241, 1), rgba(102, 252, 241, 0));
            transform-origin: 100% 50%;
            animation: scan 2s infinite linear;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .subtitle { color: #66fcf1; letter-spacing: 4px; font-size: 16px; margin-top: 10px; }

        @media (max-width: 600px) {
            .main-title { font-size: 24px; letter-spacing: 4px; }
            .radar-loader { width: 60px; height: 60px; }
            .subtitle { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="space-bg"></div>

    <div class="content-box">
        <h1 class="main-title">International Women's Day</h1>
        <div class="radar-loader"></div>
        <div class="subtitle">ESTABLISHING CONNECTION TO THE STARS...</div>
    </div>

    <script>
        // Tạo bầu trời sao động bằng JS
        const space = document.getElementById('space-bg');
        for (let i = 0; i < 200; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            let size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
            space.appendChild(star);
        }
    </script>
</body>
</html>
